<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador Alura</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <main>

        <section class="seccion1">
            <header>
                <img class="img-header" src="/img-encriptador/Logologoalura.png" alt="logoDeAlura">
                <p class="parrafo-header">ENCRIPTADOR DE TEXTO |</p>
            </header>
            <div class="muñeco-area">
                <img class="img-nuevo" src="/img-encriptador/muñeco-gris.png" alt="">
                <textarea placeholder="Ingrese el texto aqui" class="area"></textarea>
            </div>
            <div class="contenedor-leyenda">
                <img class="img-leyenda" src="/img-encriptador/exclamacion.png" alt="signo-exclamacion">
                <p class="parrafo-leyenda"> Solo letras minúsculas y sin acento</p>
            </div>

            <div class="contenedor-btn-seccion1">
                <input type="button" class="btn-encriptar" value="Encriptar">
                <input type="button" class="btn-desencriptar" value="Desencriptar">
            </div>
        </section>

        <section class="seccion2">

            <div class="contenedor-muñeco-h3-parrafo ocultar">
                <img class="img-muñeco" src="/img-encriptador/munieco.png" alt="dibujo-muñeco">
                <h3 class="h3-seccion2">Ningún mensaje fue encontrado</h3>
                <p class="parrafo-seccion2">Ingresa el texto que deseas encriptar o desencriptar</p>
            </div>

            <div class="contenedor-btn-seccion2">
                <input class="btn-seccion2" type="button" value="Copiar">
            </div>

        </section>
    </main>

    <footer class="contenedor-footer">
        <p class="parrafo-footer">Copyright</p>
        <span class="copy">&copy;</span>
        <h4 class="h4-footer">Luis Rojas | Derechos Reservados </h4>
    </footer>

</body>

</html>
